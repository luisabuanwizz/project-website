<h5 class="page3-instruct1">press this first!</h5>

<script type="text/javascript">

    const URL = "https://teachablemachine.withgoogle.com/models/Csvepl_XE/";

    let model, webcam,maxPredictions;
    let currentWinner = "";
    let capturedResult = ""; 
    let userScore = 0;

    async function init() {
        document.getElementById("webcam-container").innerHTML = "";
        document.querySelector(".scan-button").style.display = "none";
        if(document.querySelector(".page3-instruct1")) {
            document.querySelector(".page3-instruct1").style.display = "none";
        }

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        if (!model) {
    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();
}

        const flip = true; 
        webcam = new tmImage.Webcam(500, 500, flip);
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);
        document.getElementById("webcam-container").appendChild(webcam.canvas);
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        let high = 0;

        for (let i = 0; i < maxPredictions; i++) {
            let val = prediction[i].probability;
            if (val > high) {
                high = val;
                currentWinner = prediction[i].className;
            }
        }
    }
</script>

<script>

userScore = 0;

<script>

<script>
function gopage3() {

    let firstname = document.getElementById("firstname").value.trim();
    let lastname = document.getElementById("lastname").value.trim();
    let grade = document.getElementById("grade").value.trim();

    if(firstname === "" || lastname === "" || grade === ""){
        alert("Please fill the boxes before continuing!");
        return;
}
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "flex";
}
</script>
<script>
function gopage4() {
        capturedResult = currentWinner; 
        
        if (webcam) {
            webcam.stop();
        }

        document.getElementById("page3").style.display = "none";
        document.getElementById("page4").style.display = "flex";
}
</script>
<script>
function evaluateGuess(isBioGuess) {

    const recyclableItems = ["Recyclable"]; 
    const actualIsRecyclable = recyclableItems.includes(capturedResult);

    document.getElementById("page4").style.display = "none";

    if (isBioGuess === actualIsRecyclable) {
        userScore += 1;
        document.getElementById("good").style.display = "flex";
        alert("+1 point!");    
        }
    else {
        userScore -= 1;
        document.getElementById("wrong").style.display = "flex";
        alert("-1 point!")
    }
}
</script>

    const db = firebase.firestore();

   async function saveScoreToFirestore(firstname, lastname, grade, score) {
    try {
        const leaderboardRef = db.collection("leaderboard_scores");
        const snapshot = await leaderboardRef
            .where("firstname", "==", firstname)
            .where("lastname", "==", lastname)
            .where("grade", "==", grade)
            .get();

        if (!snapshot.empty) {
            const doc = snapshot.docs[0];
            await doc.ref.update({
                score: firebase.firestore.FieldValue.increment(score),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            console.log("code looking good king");
        } else {
            await leaderboardRef.add({
                firstname: firstname,
                lastname: lastname,
                grade: grade,
                score: score,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            console.log("new name added");
        }
    } catch (error) {
        console.error("Firebase Error:", error);
    }
}

    async function displayLeaderboard() {
        const leaderboardContainer = document.getElementById("leaderboard-content");
        leaderboardContainer.innerHTML = '<h2>Top 10</h2><ol id="score-list"></ol>';
        const scoreList = document.getElementById("score-list");


        try {
            const snapshot = await db.collection("leaderboard_scores")
                                   .orderBy("score", "desc")
                                   .limit(10)
                                   .get();

            snapshot.forEach(doc => {
                const data = doc.data();
                const listItem = document.createElement('li');
                listItem.textContent = `${data.firstname} ${data.lastname} (${data.grade}): ${data.score} points`;
                scoreList.appendChild(listItem);
            });

        } catch (error) {
            console.error("Error fetching leaderboard: ", error);
            leaderboardContainer.innerHTML += '<p>Error loading leaderboard. Please try again later.</p>';
        }
    }

    async function leaderboard(){
        document.getElementById("youarewrong").style.display = "none";
        document.getElementById("youaregood").style.display = "none";
        document.getElementById("leaderboard").style.display = "flex";

        const firstname = document.getElementById("firstname").value.trim();
        const lastname = document.getElementById("lastname").value.trim();
        const grade = document.getElementById("grade").value.trim();

        if (firstname && lastname && grade) {
            await saveScoreToFirestore(firstname, lastname, grade, userScore);
        } else {
            console.warn("Player details missing (First Name, Last Name, or Grade is empty), score not saved to Firestore.");
              userScore = 0;
        }

      
        displayLeaderboard();
    }    
</script>
